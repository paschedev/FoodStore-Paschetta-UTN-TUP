<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Food Store</title>
    <!-- Asumiendo que Vite sirve desde root -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <main class="container">
        <form id="registro-form" class="login-form">

            <h1 class="title">FOOD STORE</h1>
            <p class="subtitle">Crear Cuenta</p>

            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Ingresá tu email"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Ingresá tu contraseña"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Registrarse
            </button>

            <p class="register">
                ¿Ya tenés cuenta?
                <a href="/src/pages/auth/login/index.html">Iniciá sesión</a>
            </p>

        </form>
    </main>

    <!-- Script de registro -->
    <script type="module" src="./registro.ts"></script>
</body>
</html>
